  #     Top pure-math journal. Bar is a major advance — a resolution of a
  #     long-standing open problem, a fundamental new technique, or a
  #     genuinely surprising structural result. Beautiful proofs of
  #     well-known small results don't clear.

  # - slug: JAMS
  #   full_name: Journal of the American Mathematical Society
  #   field: mathematics
  #   bar_criteria: |
  #     Top general-interest math journal alongside Annals/Inventiones. Bar:
  #     significant new result, ideally cross-subfield, with techniques that
  #     are likely to be used elsewhere.

