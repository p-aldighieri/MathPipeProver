[workflow]
mode = "semi_strict"
enable_literature = false
max_branches = 2
max_prover_cycles = 3
max_total_tokens = 500000
max_tokens_per_branch = 200000
max_total_calls = 500
max_calls_per_branch = 200
run_root = "runs"
prompts_root = "prompts"
router_enabled = true
provider_timeout_seconds = 90

[providers]
browser_agent = "external_agent"

[smoke_models]
openai = "gpt-5-nano"

[role_runtime.workflow_router]
provider = "openai"
model = "gpt-5-nano"
temperature = 0.0
max_output_tokens = 96
reasoning_effort = "low"

[role_runtime.formalizer]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 1200
reasoning_effort = "high"

[role_runtime.searcher]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.3
max_output_tokens = 1200
reasoning_effort = "high"

[role_runtime.breakdown]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 1200
reasoning_effort = "high"

[role_runtime.prover]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 1500
reasoning_effort = "high"

[role_runtime.reviewer]
provider = "openai"
model = "gpt-5-nano"
temperature = 0.0
max_output_tokens = 1600
reasoning_effort = "low"

[role_runtime.consolidator]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 4000
reasoning_effort = "medium"
