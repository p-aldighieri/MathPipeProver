# Default local API-style profile.
[workflow]
mode = "semi_strict"
enable_literature = true
max_branches = 2
max_prover_cycles = 3
max_total_tokens = 2000000
max_tokens_per_branch = 1000000
max_total_calls = 20000
max_calls_per_branch = 5000
run_root = "runs"
prompts_root = "prompts"
router_enabled = true
provider_timeout_seconds = 60

[role_runtime.workflow_router]
provider = "stub"
model = "gpt-5-nano"
temperature = 0.0
max_output_tokens = 64
reasoning_effort = "low"

[role_runtime.formalizer]
provider = "stub"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000

[role_runtime.literature]
provider = "stub"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 128000

[role_runtime.searcher]
provider = "stub"
model = "gpt-5-mini"
temperature = 0.3
max_output_tokens = 64000

[role_runtime.breakdown]
provider = "stub"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000

[role_runtime.prover]
provider = "stub"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000

[role_runtime.reviewer]
provider = "stub"
model = "gpt-5-nano"
temperature = 0.0
max_output_tokens = 32000

[role_runtime.consolidator]
provider = "stub"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000
