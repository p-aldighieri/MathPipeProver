# Cost-aware live API profile.
[workflow]
mode = "semi_strict"
enable_literature = true
max_branches = 3
max_prover_cycles = 4
max_total_tokens = 450000
max_tokens_per_branch = 200000
max_total_calls = 5000
max_calls_per_branch = 1800
run_root = "runs"
prompts_root = "prompts"
router_enabled = true
provider_timeout_seconds = 60

[role_runtime.workflow_router]
provider = "openai"
model = "gpt-5-nano"
temperature = 0.0
max_output_tokens = 96
reasoning_effort = "low"

[role_runtime.formalizer]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000
reasoning_effort = "high"

[role_runtime.literature]
provider = "external_agent"
model = "browser-agent"
temperature = 0.0
max_output_tokens = 128000
reasoning_effort = "medium"

[role_runtime.searcher]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.25
max_output_tokens = 64000
reasoning_effort = "high"

[role_runtime.breakdown]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000
reasoning_effort = "high"

[role_runtime.prover]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000
reasoning_effort = "high"

[role_runtime.reviewer]
provider = "openai"
model = "gpt-5-nano"
temperature = 0.0
max_output_tokens = 32000
reasoning_effort = "low"

[role_runtime.consolidator]
provider = "openai"
model = "gpt-5-mini"
temperature = 0.2
max_output_tokens = 32000
reasoning_effort = "medium"
