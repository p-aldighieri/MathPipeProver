# Primary smart soft-scaffolding profile.
# Every completed role hands control back to the smart orchestrator.
[workflow]
mode = "semi_strict"
enable_literature = true
max_branches = 2
max_prover_cycles = 9999
max_total_tokens = 2000000
max_tokens_per_branch = 1500000
max_total_calls = 20000
max_calls_per_branch = 5000
policy_max_scope_changes_per_branch = 999
policy_max_new_assumptions_per_branch = 999
run_root = "runs"
prompts_root = "prompts/soft"
orchestrator_controls_stop = true
provider_timeout_seconds = 60

[role_runtime.formalizer]
provider = "external_agent"
model = "chatgpt-5.4-pro-extended"
temperature = 0.0
max_output_tokens = 32000
reasoning_effort = "high"

[role_runtime.literature]
provider = "external_agent"
model = "chatgpt-5.4-pro-extended"
temperature = 0.0
max_output_tokens = 64000
reasoning_effort = "high"

[role_runtime.searcher]
